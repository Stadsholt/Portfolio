<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <style>
        .carousel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            margin: 0 auto;
        }

        .main-image-container {
            width: 80%; /* Adjust this as needed */
            height: 400px; /* Adjust this as needed */
            margin-bottom: 20px;
        }

        .main-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .carousel-previews {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .carousel-previews img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.7;
            border-radius: 10px;
        }

        .carousel-previews img.active {
            opacity: 1;
            border: 3px solid #333;
        }

    </style>
</head>
<body>

<div class="carousel-container">
    <!-- Main Image -->
    <div class="main-image-container">
        <img id="main-image" src="images/image1.jpg" alt="Main Image">
    </div>

    <!-- Preview Images -->
    <div class="carousel-previews">
        <img src="images/moesgaard1.jpg" alt="Preview 1" class="preview" data-index="0">
        <img src="images/moesgaard2.jpg" alt="Preview 2" class="preview" data-index="1">
        <img src="images/image3.jpg" alt="Preview 3" class="preview" data-index="2">
        <!-- Add more images as needed -->
    </div>
</div>

<script>
    const previewImages = document.querySelectorAll('.carousel-previews img');
    const mainImage = document.getElementById('main-image');
    let currentIndex = 0;

    // Function to update the main image and highlight the active preview
    function updateCarousel(index) {
        mainImage.src = previewImages[index].src;
        currentIndex = index;

        // Update active class for previews
        previewImages.forEach((img, i) => {
            img.classList.remove('active');
            if (i === index) {
                img.classList.add('active');
            }
        });
    }

    // Add event listeners to each preview image
    previewImages.forEach((preview, index) => {
        preview.addEventListener('click', () => {
            updateCarousel(index);
        });
    });

    // Initialize the carousel with the first image active
    updateCarousel(currentIndex);
</script>

</body>
</html>
